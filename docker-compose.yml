version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: recruitment-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: recruit
      MYSQL_USER: recruit
      MYSQL_PASSWORD: recruit123456
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/recruit.sql:/docker-entrypoint-initdb.d/01-recruit.sql
    networks:
      - recruitment-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: recruitment-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/recruit?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: recruit
      SPRING_DATASOURCE_PASSWORD: recruit123456
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - recruitment-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: recruitment-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recruitment-network
    restart: unless-stopped

  admin:
    build:
      context: ./recruit-system/recruit-web
      dockerfile: Dockerfile
    container_name: recruitment-admin
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - recruitment-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  recruitment-network:
    driver: bridge
